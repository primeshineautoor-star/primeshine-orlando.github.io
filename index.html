<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prime Shine - Enlaces</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 26px;
            margin-bottom: 5px;
            color: #ffffff;
            font-weight: bold;
        }
        .subtitle {
            font-size: 14px;
            color: #007aff;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 30px;
            font-weight: bold;
        }
        .btn {
            display: block;
            background-color: #1f1f1f;
            color: #ffffff;
            text-decoration: none;
            padding: 16px;
            margin: 14px 0;
            border-radius: 8px;
            border: 1px solid #333333;
            font-weight: bold;
            font-size: 16px;
            transition: background 0.3s, transform 0.2s;
        }
        .btn:hover {
            background-color: #2a2a2a;
            transform: translateY(-2px);
            border-color: #444444;
        }
        .btn-primary {
            background-color: #007aff;
            border: none;
        }
        .btn-primary:hover {
            background-color: #0062cc;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Prime Shine</h1>
        <div class="subtitle">Orlando, FL</div>

        <!-- BOTONES: Aquí están tus TinyURL configurados de la imagen -->
        <a href="https://tinyurl.com/primesreview" class="btn btn-primary" target="_blank">⭐ Leave a review</a>
        <a href="https://tinyurl.com/primepreview" class="btn" target="_blank">✨ Check our site</a>
    </div>

</body>
</html>
